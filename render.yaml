services:
  - type: web
    name: curator-api
    runtime: python
    rootDir: scraper
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 600 --workers 1
    envVars:
      - key: AIRTABLE_TOKEN
        sync: false
      - key: APIFY_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: API_SECRET_KEY
        sync: false
      - key: BUFFER_ACCESS_TOKEN
        sync: false
      - key: BUFFER_TIKTOK_PROFILE_ID
        sync: false
      - key: BUFFER_INSTAGRAM_PROFILE_ID
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

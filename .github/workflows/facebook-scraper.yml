name: Facebook Scraper
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          pip install playwright
          playwright install chromium --with-deps

      - name: Run Facebook Scraper
        id: scraper
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_TOKEN_2: ${{ secrets.APIFY_TOKEN_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FACEBOOK_COOKIES: ${{ secrets.FACEBOOK_COOKIES }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cd scraper
          python main.py 2>&1 | tee /tmp/scraper.log
          echo "result=$(tail -1 /tmp/scraper.log)" >> "$GITHUB_OUTPUT"

      - name: Telegram Notification
        if: always()
        run: |
          if [ "${{ steps.scraper.outcome }}" = "success" ]; then
            LOG=$(tail -3 /tmp/scraper.log | tr '\n' ' ')
            MSG="✅ Facebook Scraper (Direct): ${LOG}"
          else
            MSG="❌ Facebook Scraper (Direct): failed"
          fi
          curl -sf -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${MSG}"

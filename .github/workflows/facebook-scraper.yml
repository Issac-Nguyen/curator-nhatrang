name: Facebook Scraper
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render service
        run: |
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.CURATOR_API_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "Service is up (attempt $i)"
              break
            fi
            echo "Service not ready (HTTP $STATUS), waiting 10s... (attempt $i)"
            sleep 10
          done

      - name: Call /run-facebook
        id: api
        run: |
          RESULT=$(curl -sf --max-time 300 -X POST \
            "${{ secrets.CURATOR_API_URL }}/run-facebook" \
            -H "X-API-Key: ${{ secrets.API_SECRET_KEY }}")
          echo "$RESULT"
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Telegram Notification
        if: always()
        run: |
          if [ "${{ steps.api.outcome }}" = "success" ]; then
            MSG="✅ Facebook Scraper: triggered (running in background)"
          else
            MSG="❌ Facebook Scraper: API call failed"
          fi
          curl -sf -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${MSG}"
